name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          go build -o bin/controller ./cmd/controller
          go build -o bin/agent ./cmd/agent
          go build -o bin/testsite ./examples/testsite
          echo "controller: $(du -h bin/controller | cut -f1)"
          echo "agent:      $(du -h bin/agent | cut -f1)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        run: |
          VERSION=$(head -1 CHANGELOG.md | grep -oP 'v\d+\.\d+\.\d+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Build release binaries
        run: |
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              out="shoal-${GOOS}-${GOARCH}"
              mkdir -p "dist/${out}"
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s -w" -o "dist/${out}/controller" ./cmd/controller
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "-s -w" -o "dist/${out}/agent" ./cmd/agent
              tar -czf "dist/${out}.tar.gz" -C dist "${out}"
            done
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          awk '/^## /{if(p)exit; p=1} p' CHANGELOG.md > /tmp/release-notes.md
          gh release create "$VERSION" dist/*.tar.gz \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: BINARY=controller
          tags: |
            ghcr.io/we-be/shoal-controller:${{ steps.version.outputs.version }}
            ghcr.io/we-be/shoal-controller:latest
          platforms: linux/amd64,linux/arm64

      - name: Build and push minnow image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: BINARY=agent
          tags: |
            ghcr.io/we-be/shoal-minnow:${{ steps.version.outputs.version }}
            ghcr.io/we-be/shoal-minnow:latest
          platforms: linux/amd64,linux/arm64

      - name: Build and push grouper image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.grouper
          push: true
          tags: |
            ghcr.io/we-be/shoal-grouper:${{ steps.version.outputs.version }}
            ghcr.io/we-be/shoal-grouper:latest
          platforms: linux/amd64
